<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AI智能记账</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22AI%E6%99%BA%E8%83%BD%E8%AE%B0%E8%B4%A6%22%2C%22short_name%22%3A%22%E8%AE%B0%E8%B4%A6%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f7fb%22%2C%22theme_color%22%3A%22%234f46e5%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ctext%20y%3D'.9em'%20font-size%3D'90'%3E%F0%9F%93%8A%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AI记账">
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb; color: #333; padding: 10px; max-width: 600px; margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
        }
        h1 { text-align: center; color: #4f46e5; font-size: 24px; margin: 15px 0; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        .btn, .file-label {
            background: #4f46e5; color: white; border: none; padding: 12px 16px; border-radius: 10px;
            cursor: pointer; font-size: 16px; display: inline-block; text-align: center; line-height: 1.2;
        }
        .btn-outline { background: white; color: #4f46e5; border: 1px solid #4f46e5; }
        .btn-danger { background: #ef4444; font-size: 14px; padding: 8px 12px; }
        input[type="file"] { display: none; }
        select, input[type="text"] { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 16px; }
        .stats-tabs { display: flex; gap: 5px; margin: 15px 0; }
        .stats-tabs button { padding: 10px 16px; border: 1px solid #d1d5db; background: white; border-radius: 10px; font-size: 15px; }
        .stats-tabs button.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .chart-container { display: flex; flex-direction: column; gap: 15px; margin: 15px 0; }
        .chart-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .summary { background: white; padding: 15px; border-radius: 12px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .summary-item { flex: 1; min-width: 80px; }
        .summary-item span { font-size: 14px; color: #64748b; }
        .summary-item strong { font-size: 22px; }
        .bill-cards { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .bill-card {
            background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            position: relative; display: flex; flex-wrap: wrap; align-items: center;
        }
        .bill-card .amount { font-size: 20px; font-weight: bold; min-width: 80px; }
        .bill-card .info { flex: 1; margin-left: 10px; }
        .bill-card .info .date-cat { color: #64748b; font-size: 14px; }
        .bill-card .info .counterparty { font-size: 16px; font-weight: 500; margin: 4px 0; }
        .bill-card .tags { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
        .tag { background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .bill-card .actions { margin-left: auto; display: flex; gap: 5px; }
        .editable { cursor: pointer; border-bottom: 1px dashed #cbd5e1; }
        .delete-btn { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; padding: 4px 8px; }
        @media (min-width: 600px) {
            .bill-cards { display: none; }
            .desktop-table { display: block; }
        }
        @media (max-width: 599px) {
            .desktop-table { display: none; }
            .bill-cards { display: flex; }
            .toolbar { justify-content: center; }
        }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 10px 12px; border-top: 1px solid #f1f5f9; font-size: 14px; }
        .install-banner {
            background: #4f46e5; color: white; padding: 12px; text-align: center; 
            border-radius: 10px; margin-bottom: 15px; display: none; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="installBanner" class="install-banner">📲 点击此处将记账本添加到手机主屏幕</div>
    <h1>📊 AI 智能记账</h1>

    <div class="toolbar">
        <label for="fileInput" class="file-label">📥 导入账单</label>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
        <button class="btn-outline" id="exportBtn">📤 导出</button>
        <button class="btn-outline" id="clearAllBtn">🗑️ 清空</button>
        <select id="categoryFilter" style="margin-left:auto;">
            <option value="全部">全部类别</option>
        </select>
    </div>

    <div id="summaryBox" class="summary" style="display:none;">
        <div class="summary-item"><span>📅 总笔数</span><strong id="totalCount">0</strong></div>
        <div class="summary-item"><span>💰 总支出</span><strong style="color:#ef4444;" id="totalExpense">0</strong></div>
        <div class="summary-item"><span>💵 总收入</span><strong style="color:#10b981;" id="totalIncome">0</strong></div>
    </div>

    <div class="stats-tabs">
        <button data-period="day" class="active">按日</button>
        <button data-period="week">按周</button>
        <button data-period="month">按月</button>
    </div>

    <div class="chart-container">
        <div class="chart-box"><canvas id="trendChart" height="220"></canvas></div>
        <div class="chart-box"><canvas id="categoryChart" height="220"></canvas></div>
    </div>

    <div class="desktop-table" style="overflow-x:auto;">
        <table id="billTable">
            <thead><tr><th>日期</th><th>类型</th><th>金额</th><th>分类</th><th>对方/备注</th><th>标签</th><th>操作</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div id="billCards" class="bill-cards"></div>
</div>

<script>
let bills = [];
let currentPeriod = 'day';
let trendChartInstance = null;
let categoryChartInstance = null;

let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'block';
});
document.getElementById('installBanner').addEventListener('click', () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
            document.getElementById('installBanner').style.display = 'none';
        });
    }
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('SW registered');
        }).catch(err => console.log('SW failed', err));
    });
}

document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('my_bills');
    if (saved) { try { bills = JSON.parse(saved); } catch(e) { bills = []; } }
    renderAll();
    bindEvents();
});

function bindEvents() {
    document.getElementById('fileInput').addEventListener('change', handleFileImport);
    document.getElementById('exportBtn').addEventListener('click', exportCSV);
    document.getElementById('clearAllBtn').addEventListener('click', () => {
        if (confirm('确定要清空所有记账数据吗？')) { bills = []; saveAndRender(); }
    });
    document.getElementById('categoryFilter').addEventListener('change', renderAll);
    document.querySelectorAll('.stats-tabs button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.stats-tabs button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentPeriod = this.dataset.period;
            renderCharts();
        });
    });
}

async function handleFileImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheet];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
            if (jsonData.length < 2) return alert('文件似乎没有数据');
            const headers = jsonData[0].map(h => String(h).trim());
            const rows = jsonData.slice(1);
            const parsed = mapAndClean(headers, rows);
            if (parsed.length === 0) return alert('未能识别有效账单');
            mergeBills(parsed);
            alert(`导入成功！新增 ${bills.length} 条记录`);
            saveAndRender();
        } catch (err) { alert('解析出错：' + err.message); }
    };
    reader.readAsArrayBuffer(file);
}

const FIELD_MAP = {
    date: ['交易时间','入账时间','付款时间','时间','创建时间','日期'],
    type: ['收/支','交易类型','类型','方向','收支类型'],
    amount: ['金额(元)','金额','交易金额','支出（元）','收入（元）'],
    counterparty: ['交易对方','对方','商户名称','商品说明','交易商户'],
    method: ['收/付款方式','支付方式','交易方式'],
    remark: ['备注','商品','交易备注','商品详情']
};

function mapAndClean(headers, rows) {
    const map = {};
    for (let [std, aliases] of Object.entries(FIELD_MAP)) {
        const found = headers.find(h => aliases.some(a => h.includes(a)));
        map[std] = found ? headers.indexOf(found) : -1;
    }
    if (map.date === -1 || map.amount === -1) return [];
    const records = [];
    for (let row of rows) {
        if (!row || row.every(cell => cell === '')) continue;
        let dateStr = row[map.date] ? String(row[map.date]).trim() : '';
        let typeStr = map.type !== -1 && row[map.type] ? String(row[map.type]).trim() : '';
        let amountRaw = row[map.amount] ? String(row[map.amount]).trim() : '0';
        const counterparty = map.counterparty !== -1 ? String(row[map.counterparty] || '').trim() : '';
        const remark = map.remark !== -1 ? String(row[map.remark] || '').trim() : '';
        let isExpense = true;
        if (typeStr.includes('收入') || typeStr.includes('收')) isExpense = false;
        else if (typeStr.includes('支出') || typeStr.includes('支')) isExpense = true;
        else { const num = parseFloat(amountRaw.replace(/[¥,，]/g,'')); if(!isNaN(num)) isExpense = num < 0; }
        let amount = parseFloat(amountRaw.replace(/[¥,，\s]/g,'')) || 0;
        amount = Math.abs(amount);
        let formattedDate = '';
        try {
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) formattedDate = d.toISOString().slice(0,10);
            else {
                const parts = dateStr.split(/[./-]/);
                if (parts.length === 3) formattedDate = `${parts[0].length===4?parts[0]:'20'+parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
                else formattedDate = dateStr.slice(0,10);
            }
        } catch(e) { formattedDate = dateStr.slice(0,10); }
        if (!formattedDate || amount <= 0) continue;
        records.push({
            id: Date.now() + Math.random(),
            date: formattedDate, type: isExpense ? '支出' : '收入', amount: amount,
            category: guessCategory(counterparty + remark),
            counterparty: counterparty || remark || '未知', remark: remark, tags: [], method: ''
        });
    }
    return records;
}

function guessCategory(text) {
    const rules = [
        { cat:'餐饮', keys:['饭店','餐厅','外卖','美食','肯德基','麦当劳','星巴克','奶茶','小吃','火锅','烧烤','饭'] },
        { cat:'交通', keys:['滴滴','地铁','公交','加油','停车','高速','火车票','机票','打车'] },
        { cat:'购物', keys:['淘宝','京东','拼多多','超市','商场','百货','旗舰店'] },
        { cat:'娱乐', keys:['电影','KTV','游戏','旅游','景点','酒店','民宿'] },
        { cat:'住房', keys:['房租','水电','物业','燃气'] },
        { cat:'通讯', keys:['话费','流量','宽带'] }
    ];
    for (let rule of rules) if(rule.keys.some(k => text.includes(k))) return rule.cat;
    return '其他';
}

function mergeBills(newBills) {
    const existingKeys = new Set(bills.map(b => `${b.date}_${b.amount}_${b.counterparty}`));
    for (let nb of newBills) {
        const key = `${nb.date}_${nb.amount}_${nb.counterparty}`;
        if (!existingKeys.has(key)) { bills.push(nb); existingKeys.add(key); }
    }
    bills.sort((a,b) => b.date.localeCompare(a.date));
}

function saveAndRender() {
    localStorage.setItem('my_bills', JSON.stringify(bills));
    renderAll();
}

function renderAll() {
    updateSummary();
    populateCategoryFilter();
    renderTableAndCards();
    renderCharts();
}

function updateSummary() {
    const count = bills.length;
    const expense = bills.filter(b => b.type==='支出').reduce((s,b)=>s+b.amount,0);
    const income = bills.filter(b => b.type==='收入').reduce((s,b)=>s+b.amount,0);
    document.getElementById('totalCount').textContent = count;
    document.getElementById('totalExpense').textContent = '¥'+expense.toFixed(2);
    document.getElementById('totalIncome').textContent = '¥'+income.toFixed(2);
    document.getElementById('summaryBox').style.display = count>0?'flex':'none';
}

function populateCategoryFilter() {
    const cats = [...new Set(bills.map(b=>b.category))];
    const sel = document.getElementById('categoryFilter');
    sel.innerHTML = '<option value="全部">全部类别</option>';
    cats.forEach(c => { const opt = document.createElement('option'); opt.value=c; opt.textContent=c; sel.appendChild(opt); });
}

function renderTableAndCards() {
    const filterCat = document.getElementById('categoryFilter').value;
    const filtered = filterCat==='全部' ? bills : bills.filter(b=>b.category===filterCat);
    const tbody = document.querySelector('#billTable tbody');
    tbody.innerHTML = '';
    if (filtered.length===0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;">暂无数据</td></tr>';
    } else {
        filtered.forEach(bill => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${bill.date}</td>
                <td style="color:${bill.type==='支出'?'#ef4444':'#10b981'}">${bill.type}</td>
                <td>${bill.amount.toFixed(2)}</td>
                <td class="editable" data-field="category" data-id="${bill.id}">${bill.category}</td>
                <td class="editable" data-field="counterparty" data-id="${bill.id}">${bill.counterparty}</td>
                <td class="editable" data-field="tags" data-id="${bill.id}">${(bill.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')||'点击添加'}</td>
                <td><button class="btn-danger" style="padding:4px 10px;" data-delete="${bill.id}">删除</button></td>`;
            tbody.appendChild(tr);
        });
    }
    const cardsDiv = document.getElementById('billCards');
    cardsDiv.innerHTML = '';
    if (filtered.length===0) {
        cardsDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">暂无账单记录</div>';
    } else {
        filtered.forEach(bill => {
            const card = document.createElement('div');
            card.className = 'bill-card';
            card.innerHTML = `
                <div class="amount" style="color:${bill.type==='支出'?'#ef4444':'#10b981'}">${bill.type==='支出'?'-':'+'}${bill.amount.toFixed(2)}</div>
                <div class="info">
                    <div class="date-cat">${bill.date} · <span class="editable" data-field="category" data-id="${bill.id}">${bill.category}</span></div>
                    <div class="counterparty editable" data-field="counterparty" data-id="${bill.id}">${bill.counterparty}</div>
                    <div class="tags editable" data-field="tags" data-id="${bill.id}">${(bill.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')||'<span style="color:#999;">点击加标签</span>'}</div>
                </div>
                <button class="delete-btn" data-delete="${bill.id}">✕</button>`;
            cardsDiv.appendChild(card);
        });
    }
    attachEditEvents();
    attachDeleteEvents();
}

function attachEditEvents() {
    document.querySelectorAll('.editable').forEach(el => {
        el.onclick = function(e) {
            e.stopPropagation();
            const field = this.dataset.field;
            const id = parseFloat(this.dataset.id);
            const bill = bills.find(b => b.id === id);
            if (!bill) return;
            if (field === 'tags') {
                const input = prompt('输入标签（多个用逗号分隔）：', (bill.tags||[]).join(','));
                if (input !== null) {
                    bill.tags = input.split(',').map(t=>t.trim()).filter(Boolean);
                    saveAndRender();
                }
            } else {
                const newVal = prompt(`修改${field}:`, bill[field]);
                if (newVal !== null && newVal.trim()!=='') {
                    bill[field] = newVal.trim();
                    saveAndRender();
                }
            }
        };
    });
}

function attachDeleteEvents() {
    document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.onclick = function(e) {
            e.stopPropagation();
            if (confirm('确定删除这条记录吗？')) {
                const id = parseFloat(this.dataset.delete);
                bills = bills.filter(b => b.id !== id);
                saveAndRender();
            }
        };
    });
}

function renderCharts() {
    const expenseBills = bills.filter(b => b.type==='支出');
    if (expenseBills.length===0) {
        if(trendChartInstance) trendChartInstance.destroy();
        if(categoryChartInstance) categoryChartInstance.destroy();
        return;
    }
    const aggregated = {};
    expenseBills.forEach(b => {
        let key;
        const d = new Date(b.date);
        if (currentPeriod==='week') {
            const day = d.getDay();
            const monday = new Date(d);
            monday.setDate(d.getDate() - (day===0?6:day-1));
            key = monday.toISOString().slice(0,10);
        } else if (currentPeriod==='month') key = b.date.slice(0,7);
        else key = b.date;
        aggregated[key] = (aggregated[key]||0) + b.amount;
    });
    const sortedKeys = Object.keys(aggregated).sort();
    const trendData = sortedKeys.map(k => aggregated[k]);
    const ctx1 = document.getElementById('trendChart').getContext('2d');
    if(trendChartInstance) trendChartInstance.destroy();
    trendChartInstance = new Chart(ctx1, {
        type: 'bar',
        data: { labels: sortedKeys, datasets: [{ label:'支出 (元)', data: trendData, backgroundColor:'#a5b4fc' }] },
        options: { responsive: true, plugins: { title: { display:true, text:`支出趋势 (${currentPeriod==='day'?'按日':currentPeriod==='week'?'按周':'按月'})` } } }
    });
    const catMap = {};
    expenseBills.forEach(b => catMap[b.category] = (catMap[b.category]||0) + b.amount);
    const ctx2 = document.getElementById('categoryChart').getContext('2d');
    if(categoryChartInstance) categoryChartInstance.destroy();
    categoryChartInstance = new Chart(ctx2, {
        type: 'pie',
        data: { labels: Object.keys(catMap), datasets: [{ data: Object.values(catMap), backgroundColor: ['#f87171','#fb923c','#fbbf24','#34d399','#60a5fa','#a78bfa','#f472b6'] }] },
        options: { responsive: true, plugins: { title: { display:true, text:'分类占比' } } }
    });
}

function exportCSV() {
    if (bills.length===0) return alert('没有数据可导出');
    const header = '日期,类型,金额,分类,对方/备注,标签';
    const rows = bills.map(b => `${b.date},${b.type},${b.amount},${b.category},${b.counterparty},"${(b.tags||[]).join('/')}"`);
    const csv = [header, ...rows].join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `账单_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
}
</script>
</body>
</html>
